<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Resume Builder</title>
    <meta name="description" content="Create and export professional resumes dynamically">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-color="default">
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <h1>Builder.</h1>
            </div>
            
            <div class="panel">
                <h2 class="panel-title">Sections</h2>
                <div class="draggable-sections">
                    <div class="drag-item" draggable="true" data-type="header">Header</div>
                    <div class="drag-item" draggable="true" data-type="summary">Summary</div>
                    <div class="drag-item" draggable="true" data-type="experience">Experience</div>
                    <div class="drag-item" draggable="true" data-type="education">Education</div>
                    <div class="drag-item" draggable="true" data-type="skills">Skills</div>
                    <div class="drag-item" draggable="true" data-type="projects">Projects</div>
                </div>
            </div>

            <div class="panel">
                <h2 class="panel-title">Appearance</h2>
                <div class="theme-selector" id="color-themes">
                    <button class="color-btn active" data-color="default"></button>
                    <button class="color-btn" data-color="blue" style="background:#2563eb;"></button>
                    <button class="color-btn" data-color="emerald" style="background:#059669;"></button>
                    <button class="color-btn" data-color="purple" style="background:#7c3aed;"></button>
                </div>
                <select id="font-family" class="select-input mt-1">
                    <option value="Inter">Inter</option>
                    <option value="Outfit">Outfit</option>
                    <option value="Lora">Lora</option>
                    <option value="JetBrains Mono">JetBrains Mono</option>
                </select>
            </div>

            <div class="panel mt-auto">
                <div class="controls-group">
                    <button id="btn-clear" class="btn btn-outline">Clear Document</button>
                    <button id="btn-print" class="btn btn-primary">Save as PDF</button>
                </div>
            </div>
        </aside>

        <main class="workspace">
            <div class="resume-wrapper">
                <div class="resume-sheet" id="resume-document">
                    <div id="drop-prompt" class="drop-prompt">
                        <p>Drag sections here to start</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
